version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: prestashop-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: prestashop
      MYSQL_USER: ps_user
      MYSQL_PASSWORD: ps_pass
    ports:
      - "3306:3306"

  prestashop:
    image: prestashop/prestashop:8.1-apache
    container_name: prestashop
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - ./ProjetPi-main:/var/www/html
    environment:
      DB_SERVER: db
      DB_USER: ps_user
      DB_PASSWORD: ps_pass
      DB_NAME: prestashop
    restart: always
